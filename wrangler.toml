name = "drfuhrman-ai-landing"
main = "./src/worker.ts"
compatibility_date = "2026-05-28"
compatibility_flags = ["nodejs_compat"]

# Pin the local `wrangler dev` port so it matches the vite /api proxy in
# astro.config.mjs (which targets :8787). If wrangler reports 8787 is taken,
# free it (usually a stale `wrangler dev`) rather than letting the port drift —
# a mismatched port silently breaks the astro-dev /api proxy.
[dev]
port = 8787

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = true

# NOTE: KV ids are Cloudflare-account-scoped. These belong to the account that
# currently hosts the site. Deploying into a DIFFERENT account fails with
# "KV namespace '<id>' not found [code: 10041]" — recreate with
# `wrangler kv namespace create EMAIL_QUOTA` and replace the id (and the staging
# one below). See "Deploying to your own Cloudflare account" in README.md.
[[kv_namespaces]]
binding = "EMAIL_QUOTA"
id = "f4b81233948d4ce18fc97e9a01e1b480"

[[durable_objects.bindings]]
name = "QUOTA_DO"
class_name = "EmailQuotaCoordinator"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["EmailQuotaCoordinator"]

[vars]
DIVINCI_API_BASE = "https://api.stage.divinci.app"
DIVINCI_RELEASE_ID = "6a118e81e44ce78e97327aa8"

[env.staging]
name = "drfuhrman-ai-landing-staging"

[env.staging.assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = true

[[env.staging.kv_namespaces]]
binding = "EMAIL_QUOTA"
id = "d1e3e14491264163ae0946db867f8ec8"

[[env.staging.durable_objects.bindings]]
name = "QUOTA_DO"
class_name = "EmailQuotaCoordinator"

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["EmailQuotaCoordinator"]

[env.staging.vars]
DIVINCI_API_BASE = "https://api.stage.divinci.app"
DIVINCI_RELEASE_ID = "6a118e81e44ce78e97327aa8"
