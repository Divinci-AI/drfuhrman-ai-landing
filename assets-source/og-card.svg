<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="aiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b6b3f"/>
      <stop offset="55%" stop-color="#5a8f5f"/>
      <stop offset="100%" stop-color="#9ec947"/>
    </linearGradient>
    <radialGradient id="glowLeaf" cx="22%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#9ec947" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#9ec947" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowDark" cx="82%" cy="92%" r="60%">
      <stop offset="0%" stop-color="#3b6b3f" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3b6b3f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Cream base + soft green aurora (echoes the cursor-tracked body bg) -->
  <rect width="1200" height="630" fill="#f4efda"/>
  <rect width="1200" height="630" fill="url(#glowLeaf)"/>
  <rect width="1200" height="630" fill="url(#glowDark)"/>

  <!-- Top + bottom hairline accent in the leaf green -->
  <rect x="0" y="0" width="1200" height="6" fill="#9ec947"/>
  <rect x="0" y="624" width="1200" height="6" fill="#3b6b3f"/>

  <!-- Wordmark + AI lockup -->
  <image x="319.23809523809524" y="153" width="409.5238095238095" height="86" xlink:href="data:image/svg+xml;base64,"/>
  <text x="758.7619047619048" y="228.64" font-family="Helvetica, Arial, sans-serif" font-size="96" font-weight="800" letter-spacing="-2" fill="url(#aiGrad)">AI</text>
  <path transform="translate(861.7619047619048 150.36) scale(1.0833333333333333)" d="M12 2L13.4 9.6 21 12L13.4 14.4 12 22 10.6 14.4 3 12 10.6 9.6Z" fill="#9ec947"/>
  <path transform="translate(745.7619047619048 221.56) scale(0.75)" d="M12 2L13.4 9.6 21 12L13.4 14.4 12 22 10.6 14.4 3 12 10.6 9.6Z" fill="#5a8f5f"/>

  <!-- Tagline -->
  <text x="600" y="360" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="-1" fill="#1a1a1a">Every book. Every lecture. Every answer.</text>

  <!-- Subtitle -->
  <text x="600" y="418" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="400" fill="#3d4256">AI-powered Nutritarian guidance — chat 24/7, in any language</text>

  <!-- Chat-message input illustration: rounded field with placeholder CTA +
       a green circular send button — mirrors the site's composer. -->
  <g>
    <rect x="320" y="476" width="560" height="72" rx="36" fill="#ffffff" fill-opacity="0.94" stroke="#3b6b3f" stroke-opacity="0.28" stroke-width="1.5"/>
    <text x="356" y="521" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="400" fill="#7c8390">Ask the Dr. Fuhrman AI…</text>
    <!-- send button: green disc + white paper-plane -->
    <circle cx="844" cy="512" r="28" fill="#3b6b3f"/>
    <path transform="translate(830 498) scale(1.15)" d="M2 21l21-9L2 3v7l15 2-15 2v7z" fill="#ffffff"/>
  </g>
</svg>